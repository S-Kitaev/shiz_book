server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    location /css/ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location /js/ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
