services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: shiz-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: shiz-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-shiz_book}
      POSTGRES_USER: ${POSTGRES_USER:-shiz_book}
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_DB: ${MONGO_DB:-shiz_book}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-shiz_book}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - postgres
      - mongo

  postgres:
    image: postgres:16-alpine
    container_name: shiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shiz_book}
      POSTGRES_USER: ${POSTGRES_USER:-shiz_book}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: shiz-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-shiz_book}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-shiz_book}
    volumes:
      - mongo-data:/data/db
    expose:
      - "27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  mongo-data:
